name: Apply D1 migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "YES" to apply pending migrations to production D1'
        required: true

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "YES" ]; then
            echo "::error::Confirmation failed. Type exactly 'YES' to run."
            exit 1
          fi
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm db:migrate:remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_APP_DEPLOY_TOKEN }}
