name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      # Playwright needs a browser + matching system libs; cache the
      # browser to keep subsequent runs fast without storing it in the
      # pnpm cache directory.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers (with deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit branch)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - run: pnpm test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14

  validate-allowed-users:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Validate allowed-users.json
        run: |
          node -e "
            const data = require('./allowed-users.json');
            if (!Array.isArray(data.users)) throw new Error('users must be an array');
            for (const u of data.users) {
              if (!u.github) throw new Error('missing github field');
              if (!u.name) throw new Error('missing name field');
              if (!['admin','member'].includes(u.role)) throw new Error('invalid role: ' + u.role);
            }
            console.log('allowed-users.json is valid (' + data.users.length + ' users)');
          "
